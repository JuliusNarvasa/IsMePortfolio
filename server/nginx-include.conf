# --- analytics tracking service ---
# Two snippets, paste into the matching context in your nginx config:
#  (1) the limit_req_zone goes in the http { } context (top of nginx.conf or
#      any file included at http level)
#  (2) the location block goes inside the server { } block for
#      me.bambaw-tumba.com (HTTPS)

# (1) Rate limit: 10 req/s per IP with bursts up to 20. Protects the Node
#     service from accidental floods and trivial DoS. Tunable.
limit_req_zone $binary_remote_addr zone=track:10m rate=10r/s;


# (2) Reverse-proxy to the Node service on :4322. This block lives inside
#     the HTTPS server { } for me.bambaw-tumba.com.

    location /api/ {
        limit_req zone=track burst=20 nodelay;

        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }
